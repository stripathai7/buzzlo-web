version: 1
applications:
  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    # Only rebuild when files under frontend/ change
    buildSpec:
      ignorePaths:
        - backend/**/*

  # ── Backend (FastAPI / uvicorn) ─────────────────────────────────────────────
  - appRoot: backend
    frontend:
      phases:
        preBuild:
          commands:
            - python3 -m venv .venv
            - source .venv/bin/activate
            - pip install --upgrade pip
            - pip install -r requirements.txt
        build:
          commands:
            - source .venv/bin/activate
            - python3 -c "from main import app; print('FastAPI app loaded OK')"
      artifacts:
        baseDirectory: .
        files:
          - '**/*'
      cache:
        paths:
          - .venv/**/*
    # Only rebuild when files under backend/ change
    buildSpec:
      ignorePaths:
        - frontend/**/*
