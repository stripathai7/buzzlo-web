version: 1
applications:
   - appRoot: backend
    frontend:
      phases:
        preBuild:
          commands:
            - python3 -m venv .venv
            - source .venv/bin/activate
            - pip install --upgrade pip
            - pip install -r requirements.txt
        build:
          commands:
            - source .venv/bin/activate
            - python3 -c "from main import app; print('FastAPI app loaded OK')"
      artifacts:
        baseDirectory: .
        files:
          - '**/*'
      cache:
        paths:
          - .venv/**/*
